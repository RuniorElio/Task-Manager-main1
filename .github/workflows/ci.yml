name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:

  # ==========================================================
  # FRONTEND - LINT & BUILD
  # ==========================================================
  frontend:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Build
        run: npm run build


  # ==========================================================
  # BACKEND - LINT & BUILD
  # LABORATORIO 1: CONSUMO DE GITHUB SECRETS
  # ==========================================================
  backend:
    name: Backend - Lint & Build
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Build
        run: npm run build


  # ==========================================================
  # FRONTEND - UNIT TESTS & COVERAGE
  # ==========================================================
  tests:
    name: Frontend - Unit Tests & Coverage
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests with Coverage
        run: npx vitest run --coverage


  # ==========================================================
  # FRONTEND - PLAYWRIGHT E2E
  # PostgreSQL efimero exclusivo para CI
  # ==========================================================
  e2e:
    name: Frontend - Playwright E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: taskmanager

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U postgres -d taskmanager"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    # Estas credenciales son exclusivamente para el entorno
    # efimero y descartable creado por GitHub Actions.
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/taskmanager
      JWT_SECRET: jwt_ficticio_exclusivo_para_ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # ------------------------------------------------------
      # BACKEND
      # ------------------------------------------------------

      - name: Install Backend
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Run Prisma Migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Start Backend
        working-directory: backend
        run: |
          npm run dev > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait Backend
        run: npx wait-on http://localhost:3000

      # ------------------------------------------------------
      # FRONTEND
      # ------------------------------------------------------

      - name: Install Frontend
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        working-directory: frontend
        run: npx playwright test